<!DOCTYPE html>
<html lang="ja">
<head>

    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="URBAN NEST — 都市型賃貸マンション仲介サービス。理想の部屋探しをプロがサポートします。" />
    <meta name="author" content="URBAN NEST" />

    <!-- Title -->
    <title>URBAN NEST | 都市型賃貸マンション仲介サービス</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- AOS.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />

    <!-- Swiper.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
    <link rel="stylesheet" href="css/hero.css" />
    <link rel="stylesheet" href="css/stats.css" />
    <link rel="stylesheet" href="css/properties.css" />
    <link rel="stylesheet" href="css/area.css" />
    <link rel="stylesheet" href="css/features.css" />
    <link rel="stylesheet" href="css/testimonials.css" />
    <link rel="stylesheet" href="css/faq.css" />
    <link rel="stylesheet" href="css/contact.css" />
    <link rel="stylesheet" href="css/footer.css" />

</head>
<body>

    <!-- Hero -->
    <section class="hero" id="home">

        <!-- Particles Background -->
        <div id="particles-js"></div>

        <!-- Hero Content -->
        <div class="hero__content">

            <div class="hero__label">
                <span class="hero__label-line"></span>
                <span class="hero__label-text">URBAN NEST</span>
                <span class="hero__label-line"></span>
            </div>

            <h1 class="hero__title">
                あなたの理想の<br>
                <span class="hero__title-typed" id="typed"></span>
            </h1>

            <p class="hero__description">
                都市で暮らす、理想を見つける。<br>
                プロのエージェントが、あなたにぴったりの部屋探しをサポートします。
            </p>

            <div class="hero__cta">
                <a href="#contact" class="hero__btn hero__btn--primary">
                    内見予約をする
                </a>
                <a href="#properties" class="hero__btn hero__btn--secondary">
                    物件を見る
                </a>
            </div>

            <div class="hero__scroll">
                <span class="hero__scroll-text">SCROLL</span>
                <span class="hero__scroll-line"></span>
            </div>

        </div>

        <!-- Hero Overlay -->
        <div class="hero__overlay"></div>

        <!-- Hero Background Video -->
        <div class="hero__bg">
            <video
                class="hero__video"
                autoplay
                muted
                loop
                playsinline
            >
                <source src="images/hero/hero-video.mp4" type="video/mp4">
            </video>
        </div>

    </section>



    <!-- particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <!-- Typed.js -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>
    <!-- CountUp.js -->
    <script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
    <!-- AOS.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <!-- Swiper.js -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <!-- Main JS -->
    <script src="js/main.js"></script>

</body>
</html>
